<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shyani Pal — Product Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:#f6f7fb;color:#111}

/* LAYOUT */
.container{max-width:1100px;margin:auto;padding:80px 20px}

/* HERO */
.hero{display:flex;justify-content:space-between;align-items:center;gap:40px}
.hero h1{font-size:56px;line-height:1.1}
.hero p{color:#555;margin-top:16px}

/* FLOAT IMAGE */
.hero img{width:350px;animation:float 6s ease-in-out infinite}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-15px)}100%{transform:translateY(0)}}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px;margin-top:40px}

/* CARD */
.card{background:white;padding:20px;border-radius:16px;transition:.3s;cursor:pointer}
.card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(0,0,0,.1)}
.card img{width:100%;border-radius:10px;margin-bottom:10px}

/* CHATBOT */
.chat-btn{position:fixed;bottom:20px;right:20px;width:55px;height:55px;border-radius:50%;background:#6f5cff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer}

.chat-box{position:fixed;bottom:90px;right:20px;width:280px;background:#fff;border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.2);display:none}

.chat-head{background:#6f5cff;color:#fff;padding:12px;font-weight:600;border-radius:14px 14px 0 0}

.chat-body{padding:12px;font-size:14px}

.chat-body button{width:100%;margin:5px 0;padding:8px;border:none;border-radius:8px;background:#f1f2ff;cursor:pointer}

/* MOBILE */
@media(max-width:800px){
.hero{flex-direction:column;text-align:center}
.hero h1{font-size:40px}
.hero img{width:260px}
}

</style>
</head>

<body>

<!-- HERO -->
<div class="container hero">
  <div>
    <h1>Hi, I'm Shyani 👋</h1>
    <p>Product Designer crafting fintech, SaaS & mobility experiences.</p>
  </div>
  <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png">
</div>

<!-- WORK -->
<div class="container">
  <h2>Selected Work</h2>

  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/400x250">
      <h3>HoSaksham</h3>
      <p>100+ downloads in first month 🚀</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x250">
      <h3>Mercedes-Benz</h3>
      <p>Seamless in-car connectivity</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x250">
      <h3>Fyle</h3>
      <p>Improved UX with design system</p>
    </div>

  </div>
</div>

<!-- SHYANI BOT 2.0 -->

<style>
.bot-toggle{
position:fixed;bottom:20px;right:20px;
width:60px;height:60px;border-radius:50%;
background:linear-gradient(135deg,#6f5cff,#9b8cff);
color:#fff;font-size:24px;
display:flex;align-items:center;justify-content:center;
cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.2);
transition:.3s;
z-index:999;
}
.bot-toggle:hover{transform:scale(1.1)}

.bot{
position:fixed;bottom:90px;right:20px;
width:320px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,.2);
overflow:hidden;
display:none;
animation:fadeUp .4s ease;
z-index:999;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.bot-header{
padding:14px;
font-weight:600;
background:linear-gradient(135deg,#6f5cff,#9b8cff);
color:#fff;
}

.bot-body{
padding:14px;
font-size:14px;
max-height:300px;
overflow:auto;
}

.msg{
background:#fff;
padding:10px 12px;
border-radius:12px;
margin-bottom:10px;
width:fit-content;
max-width:80%;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.user{
background:#6f5cff;
color:#fff;
margin-left:auto;
}

.options button{
width:100%;
margin-top:6px;
padding:10px;
border:none;
border-radius:10px;
background:#eef0ff;
cursor:pointer;
transition:.2s;
}
.options button:hover{background:#dde0ff}
</style>

<div class="bot-toggle" onclick="toggleBot()">💬</div>

<div class="bot" id="bot">
  <div class="bot-header">Shyani Bot ✨</div>

  <div class="bot-body" id="chat">

    <div class="msg">
      Hey 👋 I'm Shyani.<br>
      Curious about my work?
    </div>

    <div class="options">
      <button onclick="send('work')">View Work</button>
      <button onclick="send('about')">About Me</button>
      <button onclick="send('hire')">Hire Me</button>
      <button onclick="send('fun')">Fun Fact 😄</button>
    </div>

  </div>
</div>

<script>
function toggleBot(){
let b=document.getElementById("bot");
b.style.display=b.style.display==="block"?"none":"block";
}

function send(type){

let chat=document.getElementById("chat");

/* user bubble */
let user=document.createElement("div");
user.className="msg user";
user.innerText=type;
chat.appendChild(user);

/* bot reply */
let reply="";

if(type==="work") reply="You can explore my case studies just above 👆";
if(type==="about") reply="I'm a Product Designer with 4+ years in fintech, SaaS & mobility 🚗";
if(type==="hire") reply="Let’s build something amazing → shyanipal06@gmail.com ✨";
if(type==="fun") reply="Fun fact: I mix product thinking + storytelling in everything I design 😄";

setTimeout(()=>{
let bot=document.createElement("div");
bot.className="msg";
bot.innerText=reply;
chat.appendChild(bot);
chat.scrollTop=chat.scrollHeight;
},400);

}
</script>
</html>
